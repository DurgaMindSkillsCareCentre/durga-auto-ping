name: Durga Centre - Daily Rotation Ping

# ─────────────────────────────────────────────────────────────────
# WHAT THIS DOES (plain English):
# Every night this robot "rings the doorbell" of Google, Bing and
# Yandex and says "hey, come look at my sitemap, something changed."
# It also fires an IndexNow request (Bing relays it to Google +
# Yandex + Seznam.cz too) for the Durga Tamil Hub site, since that
# is the only property where we control the root folder (WordPress.
# com and Blogger do not allow root-folder uploads, so they can
# never use IndexNow — sitemap pinging is their permanent method).
#
# NEW: every single ping result (engine, target, HTTP code, time)
# gets written into status.json and committed back to this repo.
# index.html reads that file and shows REAL history — not decoration.
# ─────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: '30 1 * * *'   # 07:30 AM IST daily
  workflow_dispatch:        # lets you click "Run workflow" manually on GitHub

permissions:
  contents: write   # required so the workflow can commit status.json back

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      # ───────────────────────────────────────────────────────────
      # STEP 1: Decide which "group" of pages to focus on today
      # (day-of-year % 6 -> always 0,1,2,3,4 or 5)
      # ───────────────────────────────────────────────────────────
      - name: Get Rotation Group
        id: group
        run: echo "GROUP=$(( $(date +%j) % 6 ))" >> "$GITHUB_OUTPUT"

      # ───────────────────────────────────────────────────────────
      # STEP 2: Start a fresh results file for this run.
      # Every ping below appends one line of JSON to results.ndjson
      # (newline-delimited JSON — easy to append to, hard to corrupt).
      # ───────────────────────────────────────────────────────────
      - name: Start results log
        run: echo "" > results.ndjson

      # ───────────────────────────────────────────────────────────
      # Helper note: curl flags used everywhere below:
      #   -s            silent (no progress bar)
      #   -o /dev/null  throw away the response body, we only care about status
      #   -w "%{http_code}"  print just the HTTP status code
      #   --retry 3 --retry-delay 5   try again if the engine hiccups
      #   || echo "000"               never let one bad ping kill the whole job
      #
      # A tiny helper function "ping_and_log" does the curl call AND
      # writes one JSON line to results.ndjson with the real result.
      # ───────────────────────────────────────────────────────────
      - name: Define ping helper
        run: |
          cat > ping_helper.sh << 'EOF'
          #!/bin/bash
          # Usage: ./ping_helper.sh "EngineName" "TargetLabel" "URL"
          ENGINE="$1"
          TARGET="$2"
          URL="$3"
          TIME_UTC=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          CODE=$(curl -s -o /dev/null -w "%{http_code}" --retry 3 --retry-delay 5 "$URL" 2>/dev/null || echo "000")
          if [ "$CODE" = "200" ] || [ "$CODE" = "202" ]; then
            STATUS="success"
          else
            STATUS="failed"
          fi
          echo "  -> $ENGINE ($TARGET) responded with HTTP $CODE [$STATUS]"
          echo "{\"engine\":\"$ENGINE\",\"target\":\"$TARGET\",\"http_code\":\"$CODE\",\"status\":\"$STATUS\",\"time_utc\":\"$TIME_UTC\"}" >> results.ndjson
          EOF
          chmod +x ping_helper.sh

      - name: Group 0 - WordPress Page 1
        if: steps.group.outputs.GROUP == '0'
        run: |
          SITEMAP="https://durgapsychiatriccentrechennai.wordpress.com/sitemap-posts-post-1.xml"
          echo "Pinging engines for: $SITEMAP"
          ./ping_helper.sh "Google" "WordPress P1" "https://www.google.com/ping?sitemap=$SITEMAP"
          ./ping_helper.sh "Bing"   "WordPress P1" "https://www.bing.com/ping?sitemap=$SITEMAP"
          ./ping_helper.sh "Yandex" "WordPress P1" "https://yandex.com/blogs/realtime/ping?status=ping&url=$SITEMAP"

      - name: Group 1 - WordPress Page 2
        if: steps.group.outputs.GROUP == '1'
        run: |
          SITEMAP="https://durgapsychiatriccentrechennai.wordpress.com/sitemap-posts-post-2.xml"
          echo "Pinging engines for: $SITEMAP"
          ./ping_helper.sh "Google" "WordPress P2" "https://www.google.com/ping?sitemap=$SITEMAP"
          ./ping_helper.sh "Bing"   "WordPress P2" "https://www.bing.com/ping?sitemap=$SITEMAP"
          ./ping_helper.sh "Yandex" "WordPress P2" "https://yandex.com/blogs/realtime/ping?status=ping&url=$SITEMAP"

      - name: Group 2 - WordPress Page 3
        if: steps.group.outputs.GROUP == '2'
        run: |
          SITEMAP="https://durgapsychiatriccentrechennai.wordpress.com/sitemap-posts-post-3.xml"
          echo "Pinging engines for: $SITEMAP"
          ./ping_helper.sh "Google" "WordPress P3" "https://www.google.com/ping?sitemap=$SITEMAP"
          ./ping_helper.sh "Bing"   "WordPress P3" "https://www.bing.com/ping?sitemap=$SITEMAP"
          ./ping_helper.sh "Yandex" "WordPress P3" "https://yandex.com/blogs/realtime/ping?status=ping&url=$SITEMAP"

      - name: Group 3 - Tamil Posts Focus (Full Sitemap)
        if: steps.group.outputs.GROUP == '3'
        run: |
          SITEMAP="https://durgapsychiatriccentrechennai.wordpress.com/sitemap.xml"
          echo "Pinging engines for: $SITEMAP"
          ./ping_helper.sh "Google" "WordPress Full" "https://www.google.com/ping?sitemap=$SITEMAP"
          ./ping_helper.sh "Bing"   "WordPress Full" "https://www.bing.com/ping?sitemap=$SITEMAP"
          ./ping_helper.sh "Yandex" "WordPress Full" "https://yandex.com/blogs/realtime/ping?status=ping&url=$SITEMAP"

      - name: Group 4 - Blogger Posts
        if: steps.group.outputs.GROUP == '4'
        run: |
          SITEMAP="https://durgapsychiatric.blogspot.com/sitemap.xml"
          echo "Pinging engines for: $SITEMAP"
          ./ping_helper.sh "Google" "Blogger" "https://www.google.com/ping?sitemap=$SITEMAP"
          ./ping_helper.sh "Bing"   "Blogger" "https://www.bing.com/ping?sitemap=$SITEMAP"
          ./ping_helper.sh "Yandex" "Blogger" "https://yandex.com/blogs/realtime/ping?status=ping&url=$SITEMAP"

      - name: Group 5 - All Platforms
        if: steps.group.outputs.GROUP == '5'
        run: |
          for PAIR in \
            "WordPress Full|https://durgapsychiatriccentrechennai.wordpress.com/sitemap.xml" \
            "Blogger|https://durgapsychiatric.blogspot.com/sitemap.xml"
          do
            TARGET="${PAIR%%|*}"
            SITEMAP="${PAIR##*|}"
            echo "Pinging engines for: $SITEMAP"
            ./ping_helper.sh "Google" "$TARGET" "https://www.google.com/ping?sitemap=$SITEMAP"
            ./ping_helper.sh "Bing"   "$TARGET" "https://www.bing.com/ping?sitemap=$SITEMAP"
            ./ping_helper.sh "Yandex" "$TARGET" "https://yandex.com/blogs/realtime/ping?status=ping&url=$SITEMAP"
          done

      # ───────────────────────────────────────────────────────────
      # STEP X: IndexNow blast (Bing relays to Google + Yandex + Seznam)
      #
      # IMPORTANT: IndexNow requires a key file hosted somewhere on
      # the domain named in "host". The key file's FOLDER also sets
      # the scope — it can only vouch for URLs under that same folder.
      # WordPress.com and Blogger give zero root-folder access, so
      # their URLs can NEVER be submitted via IndexNow. Hard rule of
      # the protocol — no workaround exists. The Durga Tamil Hub
      # GitHub Pages site is the only property we control the root
      # of, so that is the only IndexNow target.
      #
      # SETUP (one-time, see chat history for details):
      #   1. Key file <key>.txt committed to root of durga-tamil-hub repo
      #   2. GitHub Secret INDEXNOW_KEY set in THIS repo (durga-auto-ping)
      #   3. This step auto-skips until the secret exists.
      # ───────────────────────────────────────────────────────────
      - name: IndexNow - Durga Tamil Hub (Google + Bing + Yandex + Seznam)
        if: ${{ secrets.INDEXNOW_KEY != '' }}
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          INDEXNOW_HOST: "durgamindskillscarecentre.github.io"
          INDEXNOW_KEY_PATH: "durga-tamil-hub"
        run: |
          echo "Submitting Durga Tamil Hub URLs to IndexNow..."
          KEY_LOCATION="https://$INDEXNOW_HOST/$INDEXNOW_KEY_PATH/$INDEXNOW_KEY.txt"
          TIME_UTC=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          CODE=$(curl -s -o /dev/null -w "%{http_code}" --retry 3 --retry-delay 5 \
            -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "{
                  \"host\": \"$INDEXNOW_HOST\",
                  \"key\": \"$INDEXNOW_KEY\",
                  \"keyLocation\": \"$KEY_LOCATION\",
                  \"urlList\": [
                    \"https://$INDEXNOW_HOST/$INDEXNOW_KEY_PATH/\",
                    \"https://$INDEXNOW_HOST/$INDEXNOW_KEY_PATH/index.html\"
                  ]
                }" || echo "000")
          if [ "$CODE" = "200" ] || [ "$CODE" = "202" ]; then
            STATUS="success"
          else
            STATUS="failed"
          fi
          echo "  -> IndexNow responded with HTTP $CODE [$STATUS]"
          echo "  (200/202 = accepted, 403 = key file not found/mismatched, 422 = URL outside key's folder scope)"
          echo "{\"engine\":\"IndexNow\",\"target\":\"Tamil Hub\",\"http_code\":\"$CODE\",\"status\":\"$STATUS\",\"time_utc\":\"$TIME_UTC\"}" >> results.ndjson

      - name: IndexNow not configured (log placeholder)
        if: ${{ secrets.INDEXNOW_KEY == '' }}
        run: |
          TIME_UTC=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "{\"engine\":\"IndexNow\",\"target\":\"Tamil Hub\",\"http_code\":\"-\",\"status\":\"not_configured\",\"time_utc\":\"$TIME_UTC\"}" >> results.ndjson

      # ───────────────────────────────────────────────────────────
      # STEP Y: Build the final status.json that index.html reads.
      # Combines today's results with rotation-group metadata, and
      # keeps a rolling history of the last 30 runs so the dashboard
      # can show a real trend, not just "today."
      # ───────────────────────────────────────────────────────────
      - name: Build status.json
        run: |
          python3 << 'PYEOF'
          import json, os
          from datetime import datetime, timezone

          group = os.environ.get("GROUP_ID", "")
          group_names = {
              "0": "WordPress Posts 1-50",
              "1": "WordPress Posts 51-100",
              "2": "WordPress Posts 101-150",
              "3": "Tamil Posts Focus (Full Sitemap)",
              "4": "Blogger Posts",
              "5": "All Platforms",
          }

          # Read this run's results
          results = []
          with open("results.ndjson") as f:
              for line in f:
                  line = line.strip()
                  if line:
                      results.append(json.loads(line))

          run_record = {
              "run_time_utc": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "group_id": group,
              "group_name": group_names.get(group, "Unknown"),
              "results": results,
          }

          # Load existing status.json if present, to keep history
          history = []
          if os.path.exists("status.json"):
              try:
                  with open("status.json") as f:
                      old = json.load(f)
                      history = old.get("history", [])
              except Exception:
                  history = []

          history.append(run_record)
          history = history[-30:]   # keep last 30 runs only

          final = {
              "last_updated_utc": run_record["run_time_utc"],
              "latest_run": run_record,
              "history": history,
          }

          with open("status.json", "w") as f:
              json.dump(final, f, indent=2)

          print("status.json written with", len(history), "runs in history")
          PYEOF
        env:
          GROUP_ID: ${{ steps.group.outputs.GROUP }}

      # ───────────────────────────────────────────────────────────
      # STEP Z: Commit status.json back to the repo so index.html
      # (loaded fresh by your browser) always shows the latest truth.
      # ───────────────────────────────────────────────────────────
      - name: Commit status.json
        run: |
          git config user.name "durga-auto-ping-bot"
          git config user.email "actions@github.com"
          git add status.json
          git diff --staged --quiet || git commit -m "Update ping status [skip ci] - $(date -u)"
          git push

      - name: Done
        run: echo "Rotation ping completed $(date -u) UTC"
