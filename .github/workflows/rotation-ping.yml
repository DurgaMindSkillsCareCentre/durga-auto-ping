name: Durga Centre - Daily Rotation Ping

on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:

      - name: Get Rotation Group
        id: group
        run: echo "GROUP=$(( $(date +%j) % 6 ))" >> $GITHUB_OUTPUT

      - name: Group 0 - WordPress Page 1
        if: steps.group.outputs.GROUP == '0'
        run: |
          curl -s "https://www.google.com/ping?sitemap=https://durgapsychiatriccentrechennai.wordpress.com/sitemap-posts-post-1.xml"
          curl -s "https://www.bing.com/ping?sitemap=https://durgapsychiatriccentrechennai.wordpress.com/sitemap-posts-post-1.xml"
          echo "Pinged WordPress Page 1"

      - name: Group 1 - WordPress Page 2
        if: steps.group.outputs.GROUP == '1'
        run: |
          curl -s "https://www.google.com/ping?sitemap=https://durgapsychiatriccentrechennai.wordpress.com/sitemap-posts-post-2.xml"
          curl -s "https://www.bing.com/ping?sitemap=https://durgapsychiatriccentrechennai.wordpress.com/sitemap-posts-post-2.xml"
          echo "Pinged WordPress Page 2"

      - name: Group 2 - WordPress Page 3
        if: steps.group.outputs.GROUP == '2'
        run: |
          curl -s "https://www.google.com/ping?sitemap=https://durgapsychiatriccentrechennai.wordpress.com/sitemap-posts-post-3.xml"
          curl -s "https://www.bing.com/ping?sitemap=https://durgapsychiatriccentrechennai.wordpress.com/sitemap-posts-post-3.xml"
          echo "Pinged WordPress Page 3"

      - name: Group 3 - Tamil Posts Focus
        if: steps.group.outputs.GROUP == '3'
        run: |
          curl -s "https://www.google.com/ping?sitemap=https://durgapsychiatriccentrechennai.wordpress.com/sitemap.xml"
          curl -s "https://www.bing.com/ping?sitemap=https://durgapsychiatriccentrechennai.wordpress.com/sitemap.xml"
          echo "Pinged Tamil focus"

      - name: Group 4 - Blogger Posts
        if: steps.group.outputs.GROUP == '4'
        run: |
          curl -s "https://www.google.com/ping?sitemap=https://durgapsychiatric.blogspot.com/sitemap.xml"
          curl -s "https://www.bing.com/ping?sitemap=https://durgapsychiatric.blogspot.com/sitemap.xml"
          echo "Pinged Blogger"

      - name: Group 5 - All Platforms
        if: steps.group.outputs.GROUP == '5'
        run: |
          curl -s "https://www.google.com/ping?sitemap=https://durgapsychiatriccentrechennai.wordpress.com/sitemap.xml"
          curl -s "https://www.google.com/ping?sitemap=https://durgapsychiatric.blogspot.com/sitemap.xml"
          curl -s "https://www.bing.com/ping?sitemap=https://durgapsychiatriccentrechennai.wordpress.com/sitemap.xml"
          curl -s "https://www.bing.com/ping?sitemap=https://durgapsychiatric.blogspot.com/sitemap.xml"
          echo "Pinged all platforms"

      - name: Done
        run: echo "Rotation ping completed $(date)"
