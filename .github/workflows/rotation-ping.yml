name: Durga Centre - Daily Rotation Ping

on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Get Rotation Group
        id: group
        run: echo "GROUP=$(( $(date +%j) % 6 ))" >> "$GITHUB_OUTPUT"

      - name: Start results log
        run: echo "" > results.ndjson

      - name: Define ping helper
        run: |
          cat > ping_helper.sh << 'EOF'
          #!/bin/bash
          ENGINE="$1"
          TARGET="$2"
          URL="$3"
          TIME_UTC=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          CODE=$(curl -s -o /dev/null -w "%{http_code}" --retry 3 --retry-delay 5 "$URL" 2>/dev/null || echo "000")
          if [ "$CODE" = "200" ] || [ "$CODE" = "202" ]; then
            STATUS="success"
          else
            STATUS="failed"
          fi
          echo "  -> $ENGINE ($TARGET) responded with HTTP $CODE [$STATUS]"
          echo "{\"engine\":\"$ENGINE\",\"target\":\"$TARGET\",\"http_code\":\"$CODE\",\"status\":\"$STATUS\",\"time_utc\":\"$TIME_UTC\"}" >> results.ndjson
          EOF
          chmod +x ping_helper.sh

      - name: Group 0 - WordPress Page 1
        if: steps.group.outputs.GROUP == '0'
        run: |
          SITEMAP="https://durgapsychiatriccentrechennai.
