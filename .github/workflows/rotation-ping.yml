name: Tamil Hub IndexNow Daily

on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  indexnow:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: IndexNow Ping (Tamil Hub)
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: |
          T=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          if [ -z "$INDEXNOW_KEY" ]; then
            echo "{\"engine\":\"IndexNow\",\"status\":\"not_configured\",\"time_utc\":\"$T\"}" > status.json
            exit 0
          fi

          HOST="durgamindskillscarecentre.github.io"
          PATHNAME="durga-tamil-hub"
          KEYLOC="https://$HOST/$PATHNAME/$INDEXNOW_KEY.txt"

          CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST https://api.indexnow.org/indexnow \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "{
              \"host\":\"$HOST\",
              \"key\":\"$INDEXNOW_KEY\",
              \"keyLocation\":\"$KEYLOC\",
              \"urlList\":[
                \"https://$HOST/$PATHNAME/\",
                \"https://$HOST/$PATHNAME/index.html\"
              ]
            }")

          if [ "$CODE" = "200" ] || [ "$CODE" = "202" ]; then
            STATUS="success"
          else
            STATUS="failed"
          fi

          cat > status.json <<EOF
          {
            "last_updated_utc":"$T",
            "engine":"IndexNow",
            "http_code":"$CODE",
            "status":"$STATUS"
          }
          EOF

      - name: Commit status.json
        run: |
          git config user.name "durga-auto-ping-bot"
          git config user.email "actions@github.com"
          git add status.json
          git diff --staged --quiet || git commit -m "Update IndexNow status"
          git push
